<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Жүзден жүйрік</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div class="glitch-overlay" id="glitchOverlay"></div>
    <div class="bg-orbs">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
    </div>

    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 15C8.686 15 6 12.314 6 9V3H18V9C18 12.314 15.314 15 12 15Z" stroke="url(#trophyGrad)" stroke-width="1.8" stroke-linejoin="round"/>
                        <path d="M6 5H3C3 5 3 10 6 10" stroke="url(#trophyGrad)" stroke-width="1.8" stroke-linecap="round"/>
                        <path d="M18 5H21C21 5 21 10 18 10" stroke="url(#trophyGrad)" stroke-width="1.8" stroke-linecap="round"/>
                        <path d="M12 15V19" stroke="url(#trophyGrad)" stroke-width="1.8" stroke-linecap="round"/>
                        <path d="M8 21H16" stroke="url(#trophyGrad)" stroke-width="1.8" stroke-linecap="round"/>
                        <defs>
                            <linearGradient id="trophyGrad" x1="3" y1="3" x2="21" y2="21" gradientUnits="userSpaceOnUse">
                                <stop offset="0%" stop-color="#FFD700"/>
                                <stop offset="100%" stop-color="#FFA500"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </span>
                <div>
                    <div class="logo-title">Жүзден жүйрік</div>
                    <div class="logo-sub">Мектеп рейтинг жүйесі</div>
                </div>
            </div>
            <div class="header-btns">
                <button class="btn-news" onclick="openNewsModal()" title="Жаңалықтар">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18 8C18 6.4087 17.3679 4.88258 16.2426 3.75736C15.1174 2.63214 13.5913 2 12 2C10.4087 2 8.88258 2.63214 7.75736 3.75736C6.63214 4.88258 6 6.4087 6 8C6 15 3 17 3 17H21C21 17 18 15 18 8Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M13.73 21C13.5542 21.3031 13.3019 21.5547 12.9982 21.7295C12.6946 21.9044 12.3504 21.9965 12 21.9965C11.6496 21.9965 11.3054 21.9044 11.0018 21.7295C10.6982 21.5547 10.4458 21.3031 10.27 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Дизайн ауыстыру">
                    <svg class="icon-purple" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8"/>
                        <circle cx="8.5" cy="10" r="1.5" fill="currentColor"/>
                        <circle cx="12" cy="7.5" r="1.5" fill="currentColor"/>
                        <circle cx="15.5" cy="10" r="1.5" fill="currentColor"/>
                        <path d="M7 15.5C7 15.5 8.5 17 12 17C13.5 17 15 16 15 14.5C15 13.5 14 13 12 13H10C8.343 13 7 13.895 7 15.5Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                    <svg class="icon-blue" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8"/>
                        <circle cx="8.5" cy="10" r="1.5" fill="currentColor"/>
                        <circle cx="12" cy="7.5" r="1.5" fill="currentColor"/>
                        <circle cx="15.5" cy="10" r="1.5" fill="currentColor"/>
                        <path d="M7 15.5C7 15.5 8.5 17 12 17C13.5 17 15 16 15 14.5C15 13.5 14 13 12 13H10C8.343 13 7 13.895 7 15.5Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                </button>
                <button class="btn-login" id="loginBtn" onclick="adminLogin()">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="5" y="11" width="14" height="11" rx="2" stroke="currentColor" stroke-width="1.8"/>
                        <path d="M8 11V7C8 4.791 9.791 3 12 3C14.209 3 16 4.791 16 7V11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        <circle cx="12" cy="16" r="1.5" fill="currentColor"/>
                    </svg>
                    Кіру
                </button>
                <button class="btn-logout hidden" id="logoutBtn" onclick="adminLogout()">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        <polyline points="16 17 21 12 16 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        <line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                    Шығу
                </button>
            </div>
        </div>
    </header>

    <div class="tabs-wrap">
        <div class="tabs-bar" id="tabs"></div>
    </div>

    <main class="main">
        <div id="adminPanel" class="admin-panel hidden">
            <div class="admin-grid">
                <div class="admin-card">
                    <div class="admin-card-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M3 21H21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                            <path d="M5 21V7L12 3L19 7V21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M9 21V15H15V21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                            <rect x="9.5" y="8" width="2" height="2" rx="0.5" fill="currentColor"/>
                            <rect x="12.5" y="8" width="2" height="2" rx="0.5" fill="currentColor"/>
                        </svg>
                    </div>
                    <h3>Жаңа сынып</h3>
                    <div class="input-group">
                        <input type="text" id="newClassName" placeholder="Мысалы: 8А" class="inp">
                        <button class="btn-add" onclick="addClass()">Қосу</button>
                    </div>
                    <button class="btn-delete-class hidden" id="deleteClassBtn" onclick="deleteClass(activeTab)"></button>
                </div>
                <div class="admin-card">
                    <div class="admin-card-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/>
                            <path d="M4 20C4 17.239 7.582 15 12 15C16.418 15 20 17.239 20 20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <h3>Жаңа оқушы</h3>
                    <div class="input-group">
                        <input type="text" id="newName" placeholder="Аты-жөні" class="inp">
                        <input type="number" id="newBaseScore" placeholder="Бастапқы балл (міндетті емес)" class="inp">
                        <select id="newClass" class="inp">
                            <option value="">— Сынып —</option>
                        </select>
                        <button class="btn-add" onclick="addStudent()">Қосу</button>
                    </div>
                </div>
                <div class="admin-card">
                    <div class="admin-card-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M18 8C18 6.4087 17.3679 4.88258 16.2426 3.75736C15.1174 2.63214 13.5913 2 12 2C10.4087 2 8.88258 2.63214 7.75736 3.75736C6.63214 4.88258 6 6.4087 6 8C6 15 3 17 3 17H21C21 17 18 15 18 8Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M13.73 21C13.5542 21.3031 13.3019 21.5547 12.9982 21.7295C12.6946 21.9044 12.3504 21.9965 12 21.9965C11.6496 21.9965 11.3054 21.9044 11.0018 21.7295C10.6982 21.5547 10.4458 21.3031 10.27 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <h3>Жаңалық қосу</h3>
                    <div class="input-group">
                        <input type="text" id="newsVersion" placeholder="Версия (мысалы: v1.4)" class="inp">
                        <textarea id="newsText" placeholder="Жаңалық мәтіні (әр жол — бөлек пункт)" class="inp" rows="4" style="resize:vertical;font-family:inherit;line-height:1.5"></textarea>
                        <button class="btn-add" onclick="addNews()">Жариялау</button>
                    </div>
                </div>
            <div class="search-box">
                <span class="search-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/>
                        <path d="M16.5 16.5L21 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                </span>
                <input type="text" id="filterInput" placeholder="Оқушы немесе сынып іздеу..." oninput="renderStudents()" class="search-inp">
            </div>
        </div>

        <div class="section-header">
            <h2 id="sectionTitle">📊 Мектеп рейтингі</h2>
        </div>

        <div id="studentList" class="student-grid"></div>
        <div id="top3"></div>
    </main>

    <div class="made-by">made by Aidos</div>

    <!-- Жаңалықтар модалы -->
    <div class="modal-overlay hidden" id="newsModal" onclick="if(event.target===this)closeNewsModal()">
        <div class="modal-box news-modal-box">
            <div class="modal-icon">
                <svg width="38" height="38" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 8C18 6.4087 17.3679 4.88258 16.2426 3.75736C15.1174 2.63214 13.5913 2 12 2C10.4087 2 8.88258 2.63214 7.75736 3.75736C6.63214 4.88258 6 6.4087 6 8C6 15 3 17 3 17H21C21 17 18 15 18 8Z" stroke="url(#bellGrad)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M13.73 21C13.5542 21.3031 13.3019 21.5547 12.9982 21.7295C12.6946 21.9044 12.3504 21.9965 12 21.9965C11.6496 21.9965 11.3054 21.9044 11.0018 21.7295C10.6982 21.5547 10.4458 21.3031 10.27 21" stroke="url(#bellGrad)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="bellGrad" x1="3" y1="2" x2="21" y2="22" gradientUnits="userSpaceOnUse">
                            <stop offset="0%" stop-color="#a855f7"/>
                            <stop offset="100%" stop-color="#7c3aed"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <h2 class="modal-title">Жаңалықтар</h2>
            <p class="modal-sub">Соңғы жаңартулар мен өзгерістер</p>
            <div class="news-changelog" id="newsChangelogList">
                <div class="news-loading">Жүктелуде...</div>
            </div>
            <div class="modal-btns" style="justify-content:center; margin-top:20px;">
                <button class="btn-submit" onclick="closeNewsModal()">Жабу</button>
            </div>
        </div>
    </div>
    <!-- Модальное окно входа -->
    <div class="modal-overlay hidden" id="loginModal" onclick="if(event.target===this)closeLoginModal()">
        <div class="modal-box">
            <div class="modal-icon">
                <svg width="38" height="38" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="5" y="11" width="14" height="11" rx="2" stroke="url(#lockGrad)" stroke-width="1.6"/>
                    <path d="M8 11V7C8 4.791 9.791 3 12 3C14.209 3 16 4.791 16 7V11" stroke="url(#lockGrad)" stroke-width="1.6" stroke-linecap="round"/>
                    <circle cx="12" cy="16" r="1.5" fill="url(#lockGrad)"/>
                    <defs>
                        <linearGradient id="lockGrad" x1="5" y1="3" x2="19" y2="22" gradientUnits="userSpaceOnUse">
                            <stop offset="0%" stop-color="#a855f7"/>
                            <stop offset="100%" stop-color="#7c3aed"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <h2 class="modal-title">Кіру</h2>
            <p class="modal-sub">Әкімші панеліне кіру</p>
            <div class="modal-field">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="admin@school.kz" class="inp" onkeydown="if(event.key==='Enter')document.getElementById('loginPassword').focus()">
            </div>
            <div class="modal-field">
                <label>Пароль</label>
                <input type="password" id="loginPassword" placeholder="••••••••" class="inp" onkeydown="if(event.key==='Enter')submitLogin()">
            </div>
            <div class="login-error" id="loginError"></div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeLoginModal()">Бас тарту</button>
                <button class="btn-submit" id="loginSubmitBtn" onclick="submitLogin()">Кіру</button>
            </div>
        </div>
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
